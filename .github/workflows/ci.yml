name: CI

on:
  push:
    branches:
      - master
      - main
      - trunk
      - 'release/**'
  pull_request:

jobs:
  phpstan:
    name: PHPStan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none
          tools: composer:v2

      - name: Cache Composer
        uses: actions/cache@v5
        with:
          path: ~/.composer/cache
          key: composer-${{ runner.os }}-${{ hashFiles('composer.lock') }}
          restore-keys: composer-${{ runner.os }}-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --memory-limit=1G

  phpcs:
    name: PHPCS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none
          tools: composer:v2

      - name: Cache Composer
        uses: actions/cache@v5
        with:
          path: ~/.composer/cache
          key: composer-${{ runner.os }}-${{ hashFiles('composer.lock') }}
          restore-keys: composer-${{ runner.os }}-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Run PHPCS
        run: vendor/bin/phpcs

  phpunit:
    name: PHPUnit ${{ matrix.php }} / ${{ matrix.db }}
    runs-on: ubuntu-latest
    # Only the MariaDB floor (10.2) gates today. The current-release and MySQL legs
    # run non-gating: they surface tracked cross-engine divergences (JSON column
    # round-trips and NO_ZERO_DATE strict mode on MySQL 8; temporary-table
    # visibility on MariaDB 11.4) rather than block master. Promote a leg to gating
    # once its divergence is fixed. See #230 / #220.
    continue-on-error: ${{ matrix.allow_failure || false }}

    strategy:
      fail-fast: false
      matrix:
        # Test both engines at the supported floor and a current release, so
        # MySQL/MariaDB dialect divergence surfaces in CI (see #230, #220).
        include:
          # MariaDB floor (10.2): gating.
          - { php: '8.1', db: 'mariadb:10.2' }
          # Current releases + MySQL: non-gating until their divergences are fixed.
          - { php: '8.2', db: 'mariadb:11.4', allow_failure: true }
          - { php: '8.1', db: 'mysql:5.7', allow_failure: true }
          - { php: '8.2', db: 'mysql:8.4', allow_failure: true }

    env:
      TEST_PHP_VERSION: ${{ matrix.php }}
      WP_VERSION: '6.7'
      DB_IMAGE: ${{ matrix.db }}
      SKIP_PHPCS: 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run PHPUnit
        run: bin/run-tests.sh -- --group default
